name: Build Latest Wheelhouse

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  push:
    paths:
      - .github/workflows/build-wheelhouse.yml
  pull_request:
    paths:
      - .github/workflows/build-wheelhouse.yml

jobs:
  download-wheels:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PYTHON_VERSION: "3.13"
      CUDA_CHANNEL: "cu13"

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Resolve latest TensorRT and Polygraphy versions
        id: resolve
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          cuda_channel = os.environ["CUDA_CHANNEL"]
          packages = [f"tensorrt-{cuda_channel}", "polygraphy"]

          def latest_version(package_name: str) -> str:
              with urllib.request.urlopen(f"https://pypi.org/pypi/{package_name}/json") as response:
                  payload = json.load(response)
              version = payload["info"]["version"]
              if not version:
                  raise SystemExit(f"Could not resolve latest version for {package_name}")
              return version

          resolved = [f"{package}=={latest_version(package)}" for package in packages]

          wheel_requirements = Path("wheel-requirements.txt")
          wheel_requirements.write_text("\n".join(resolved) + "\n", encoding="utf-8")

          manifest = {
              "python_version": os.environ["PYTHON_VERSION"],
              "cuda_channel": cuda_channel,
              "packages": {
                  requirement.split("==", 1)[0]: requirement.split("==", 1)[1]
                  for requirement in resolved
              },
          }
          Path("wheel-manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )

          trt_version = manifest["packages"][f"tensorrt-{cuda_channel}"]
          polygraphy_version = manifest["packages"]["polygraphy"]
          artifact_name = (
              f"wheelhouse-linux-py{os.environ['PYTHON_VERSION'].replace('.', '')}-"
              f"{cuda_channel}-trt-{trt_version}-poly-{polygraphy_version}"
          )

          github_output = os.environ.get("GITHUB_OUTPUT")
          if github_output:
              with open(github_output, "a", encoding="utf-8") as output_file:
                  output_file.write(f"artifact_name={artifact_name}\n")
                  output_file.write(f"tensorrt_version={trt_version}\n")
                  output_file.write(f"polygraphy_version={polygraphy_version}\n")

          print("Resolved wheel requirements:")
          print(wheel_requirements.read_text(encoding="utf-8"))
          print("Manifest:")
          print(json.dumps(manifest, indent=2))
          PY

      - name: Download latest wheel packages
        run: |
          mkdir -p wheelhouse
          python -m pip download \
            --dest wheelhouse \
            --only-binary=:all: \
            -r wheel-requirements.txt

      - name: Show wheelhouse contents
        run: ls -lah wheelhouse

      - name: Write job summary
        run: |
          {
            echo "## Wheelhouse"
            echo
            echo "- Python: $PYTHON_VERSION"
            echo "- CUDA channel: $CUDA_CHANNEL"
            echo "- TensorRT: ${{ steps.resolve.outputs.tensorrt_version }}"
            echo "- Polygraphy: ${{ steps.resolve.outputs.polygraphy_version }}"
            echo
            echo "### Requirements"
            echo '```text'
            cat wheel-requirements.txt
            echo '```'
            echo
            echo "### Files"
            echo '```text'
            ls -1 wheelhouse
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.resolve.outputs.artifact_name }}
          path: |
            wheelhouse/*.whl
            wheel-requirements.txt
            wheel-manifest.json
          if-no-files-found: error
          retention-days: 14
