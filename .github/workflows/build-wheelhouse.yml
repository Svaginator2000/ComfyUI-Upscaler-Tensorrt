name: Build Latest Wheelhouse

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  push:
    paths:
      - .github/workflows/build-wheelhouse.yml
  pull_request:
    paths:
      - .github/workflows/build-wheelhouse.yml

jobs:
  download-wheels:
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.13"
      CUDA_CHANNEL: "cu13"
      NVIDIA_INDEX_URL: "https://pypi.nvidia.com"

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Download wheel packages
        run: |
          mkdir -p wheelhouse
          python -m pip download \
            --dest wheelhouse \
            --only-binary=:all: \
            --extra-index-url "$NVIDIA_INDEX_URL" \
            "tensorrt-${CUDA_CHANNEL}" \
            "tensorrt-${CUDA_CHANNEL}-bindings" \
            "tensorrt-${CUDA_CHANNEL}-libs" \
            polygraphy

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheelhouse-linux-py313-cu13
          path: wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 14
